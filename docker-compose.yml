services:
  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - user-db-data:/var/lib/postgresql/data

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    depends_on:
      user-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://user_user:user_pass@user-db:5432/user_db
    ports:
      - "8081:8081"

  activemq:
    image: rmohr/activemq:5.15.9
    container_name: activemq
    environment:
      ACTIVEMQ_ADMIN_LOGIN: admin
      ACTIVEMQ_ADMIN_PASSWORD: admin
    ports:
      - "61616:61616"
      - "8161:8161"

  rental-db:
    image: mongo:7
    container_name: rental-db
    ports:
      - "27017:27017"
    volumes:
      - rental-db-data:/data/db

  rental-service:
    build:
      context: ./services/rental-service
    container_name: rental-service
    depends_on:
      - rental-db
      - activemq
      - user-service
      - scooter-availability-service
    environment:
      MONGODB_URI: mongodb://rental-db:27017/rental_db
      USER_SERVICE_BASE_URL: http://user-service:8081
      SCOOTER_SERVICE_HOST: scooter-availability-service
      SCOOTER_SERVICE_PORT: 50051
      ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      ACTIVEMQ_USER: admin
      ACTIVEMQ_PASSWORD: admin
    ports:
      - "8082:8082"

  scooter-availability-service:
    build:
      context: ./services/scooter-availability-service
    container_name: scooter-availability-service
    ports:
      - "50051:50051"
    volumes:
      - scooter-availability-data:/app/data

  grpcui:
    image: fullstorydev/grpcui:latest
    container_name: grpcui
    depends_on:
      - scooter-availability-service
    command: ["-plaintext", "scooter-availability-service:50051"]
    ports:
      - "8080:8080"

volumes:
  user-db-data:
  rental-db-data:
  scooter-availability-data:
